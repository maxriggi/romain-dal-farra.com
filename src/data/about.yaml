bio_intro: >
  Issu d'une formation technique avec un Bac STI Electrotechnique obtenu à Metz,
  j'ai choisi de suivre ma passion pour l'image et la narration visuelle. Ce parcours
  atypique m'a mené à l'Institut Européen de Cinéma et de l'Audiovisuel (IECA) de Nancy,
  où j'ai obtenu ma Licence et entamé un Master en production et réalisation de films documentaire.

citation: >
  Chaque plan est une histoire. Chaque lumière, une émotion. Mon métier, c'est de capturer l'invisible.

bio_parcours: >
  Depuis 2015, j'exerce en tant que réalisateur monteur indépendant auprès d'entreprises,
  institutions, artistes et particuliers de la région Grand-Est et du Luxembourg et j'offre
  mes services en la qualité de technicien et opérateur plateau, photographe, avec une forte
  proximité aux métiers de l'image, de la lumière à l'audiovisuel. Mon double parcours — technique et
  artistique — me confère une approche unique : la rigueur de l'ingénierie au service de la
  sensibilité du cinéaste.

bio_expertise: >
  Je travaille entre la France et le Luxembourg, au cœur de la région Grand Est, sur des
  productions allant des émissions TV, fictions, publicités, films d'entreprises et
  institutionnels à l'événementiel.

bio_transmission: >
  Porté par l'importance de la transmission, j'anime également des ateliers d'initiation
  au cinéma auprès de tous les publics, convaincu que le 7ème art et la création audiovisuelle
  sont de formidables outils d'expression et de lien social.
